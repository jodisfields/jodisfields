<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="GitHub profile metrics for Jodis Fields.">
    <title>Jodis Fields - GitHub Metrics</title>
    <style>
      :root {
        color-scheme: light dark;
        --background: #f7f5ef;
        --foreground: #171615;
        --muted: #66615a;
        --line: #d9d1c3;
        --surface: #ffffff;
        --acid: #42f584;
        --warning: #ff5a36;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 12% 18%, rgba(66, 245, 132, 0.13), transparent 24rem),
          radial-gradient(circle at 88% 8%, rgba(255, 90, 54, 0.15), transparent 18rem),
          var(--background);
        color: var(--foreground);
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        content: "";
        background-image:
          linear-gradient(rgba(23, 22, 21, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 22, 21, 0.04) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: linear-gradient(to bottom, black, transparent 84%);
      }

      canvas {
        position: fixed;
        inset: 0;
        z-index: -1;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.32;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        margin-bottom: 24px;
      }

      .quote {
        margin-bottom: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: color-mix(in srgb, var(--surface) 82%, transparent);
        padding: 18px 20px;
      }

      .quote p {
        margin: 0;
        color: var(--foreground);
        font-size: 1.08rem;
        line-height: 1.5;
      }

      .quote footer {
        margin-top: 10px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.8rem;
      }

      h1 {
        display: inline-block;
        margin: 0;
        font-size: clamp(2.8rem, 8vw, 5.8rem);
        line-height: 0.95;
        letter-spacing: 0;
        cursor: crosshair;
        text-shadow: 0 0 22px rgba(66, 245, 132, 0.18);
      }

      .metrics {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .terminal {
        position: fixed;
        right: max(16px, calc((100vw - 960px) / 2));
        bottom: 16px;
        z-index: 10;
        display: none;
        width: min(520px, calc(100vw - 32px));
        border: 1px solid color-mix(in srgb, var(--acid) 58%, var(--line));
        border-radius: 8px;
        background: rgba(12, 16, 13, 0.92);
        color: #c9ffd8;
        box-shadow: 0 22px 90px rgba(0, 0, 0, 0.28);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        overflow: hidden;
      }

      .terminal.is-open {
        display: block;
      }

      .terminal header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0;
        border-bottom: 1px solid rgba(201, 255, 216, 0.22);
        padding: 10px 12px;
        color: #f4fff7;
        font-size: 0.8rem;
      }

      .terminal button {
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }

      .terminal pre {
        max-height: 300px;
        margin: 0;
        overflow: auto;
        padding: 14px;
        white-space: pre-wrap;
      }

      .terminal-line {
        color: var(--acid);
      }

      .packet {
        position: fixed;
        z-index: 20;
        pointer-events: none;
        color: var(--acid);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.78rem;
        animation: packet-float 900ms ease-out forwards;
      }

      @keyframes packet-float {
        from {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }

        to {
          opacity: 0;
          transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.72);
        }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #151411;
          --foreground: #f4efe6;
          --muted: #c4bcad;
          --line: #3d382f;
          --surface: #f7f5ef;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        canvas,
        .packet {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="glyph-rain" aria-hidden="true"></canvas>
    <main>
      <header>
        <h1 id="scramble-name">Jodis Fields</h1>
      </header>
      <aside class="quote" aria-live="polite">
        <p id="kanye-quote">Loading quote...</p>
        <footer>Kanye REST API</footer>
      </aside>
      <img class="metrics" src="github-metrics.svg" alt="GitHub activity metrics for jodisfields">
    </main>
    <aside class="terminal" id="terminal" aria-label="Fake terminal">
      <header>
        <span>local://definitely-not-root</span>
        <button type="button" id="terminal-close" aria-label="Close terminal">close</button>
      </header>
      <pre id="terminal-output"></pre>
    </aside>
    <script>
      const quoteElement = document.getElementById('kanye-quote');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      fetch('https://api.kanye.rest/')
        .then(response => {
          if (!response.ok) {
            throw new Error('Quote request failed');
          }

          return response.json();
        })
        .then(data => {
          if (typeof data.quote !== 'string' || data.quote.trim() === '') {
            throw new Error('Quote response was invalid');
          }

          quoteElement.textContent = `"${data.quote}"`;
        })
        .catch(() => {
          quoteElement.textContent = 'Quote unavailable.';
        });

      const nameElement = document.getElementById('scramble-name');
      const originalName = nameElement.textContent;
      const glyphs = '#$%&*+-/<>?@[]{}0123456789ABCDEF';
      let scrambleTimer;

      function scrambleName() {
        clearInterval(scrambleTimer);
        let frame = 0;

        scrambleTimer = setInterval(() => {
          nameElement.textContent = originalName
            .split('')
            .map((character, index) => {
              if (character === ' ' || index < frame / 2) {
                return character;
              }

              return glyphs[Math.floor(Math.random() * glyphs.length)];
            })
            .join('');

          frame += 1;

          if (frame > originalName.length * 2) {
            clearInterval(scrambleTimer);
            nameElement.textContent = originalName;
          }
        }, 32);
      }

      nameElement.addEventListener('mouseenter', scrambleName);
      nameElement.addEventListener('focus', scrambleName);

      const canvas = document.getElementById('glyph-rain');
      const context = canvas.getContext('2d');
      const rainGlyphs = '01{}[]<>/\\$#@';
      let columns = [];
      let frame = 0;

      function resizeCanvas() {
        const ratio = window.devicePixelRatio || 1;
        canvas.width = Math.floor(window.innerWidth * ratio);
        canvas.height = Math.floor(window.innerHeight * ratio);
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;
        context.setTransform(ratio, 0, 0, ratio, 0, 0);
        columns = Array.from({ length: Math.ceil(window.innerWidth / 18) }, () =>
          Math.random() * window.innerHeight
        );
      }

      function drawRain() {
        if (reduceMotion) {
          return;
        }

        context.fillStyle = 'rgba(247, 245, 239, 0.08)';
        context.fillRect(0, 0, window.innerWidth, window.innerHeight);
        context.fillStyle = getComputedStyle(document.documentElement)
          .getPropertyValue('--acid')
          .trim();
        context.font = '14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';

        columns.forEach((y, index) => {
          const text = rainGlyphs[Math.floor(Math.random() * rainGlyphs.length)];
          const x = index * 18;
          context.fillText(text, x, y);
          columns[index] = y > window.innerHeight + Math.random() * 900 ? 0 : y + 18;
        });

        frame = window.requestAnimationFrame(drawRain);
      }

      if (!reduceMotion) {
        resizeCanvas();
        drawRain();
        window.addEventListener('resize', () => {
          window.cancelAnimationFrame(frame);
          resizeCanvas();
          drawRain();
        });
      }

      function spawnPackets(event) {
        if (reduceMotion) {
          return;
        }

        const labels = ['ACK', 'SYN', '200', '0xDEAD', 'git gud', 'sudo nope', 'ye'];

        for (let index = 0; index < 9; index += 1) {
          const packet = document.createElement('span');
          packet.className = 'packet';
          packet.textContent = labels[Math.floor(Math.random() * labels.length)];
          packet.style.left = `${event.clientX}px`;
          packet.style.top = `${event.clientY}px`;
          packet.style.setProperty('--tx', `${Math.random() * 180 - 90}px`);
          packet.style.setProperty('--ty', `${Math.random() * -150 - 20}px`);
          document.body.appendChild(packet);
          packet.addEventListener('animationend', () => packet.remove(), { once: true });
        }
      }

      document.addEventListener('click', spawnPackets);

      const terminal = document.getElementById('terminal');
      const terminalOutput = document.getElementById('terminal-output');
      const terminalClose = document.getElementById('terminal-close');
      const lines = [
        '$ whoami',
        'jodisfields',
        '$ nmap github-metrics.svg',
        '247430 bytes of harmless flex detected',
        '$ sudo rm -rf boring',
        'permission granted',
        '$ curl kanye.rest | jq .quote',
        quoteElement.textContent,
        '$ deploy --vibes=chaotic --risk=zero',
        'static page armed with decorative nonsense'
      ];

      function openTerminal() {
        terminal.classList.add('is-open');
        terminalOutput.textContent = '';
        let index = 0;

        const writer = window.setInterval(() => {
          const line = lines[index];
          terminalOutput.textContent += `${line}\n`;
          index += 1;

          if (index >= lines.length) {
            window.clearInterval(writer);
          }
        }, 120);
      }

      terminalClose.addEventListener('click', () => terminal.classList.remove('is-open'));

      document.addEventListener('keydown', event => {
        if (event.key === '`' || event.key === '~') {
          event.preventDefault();
          openTerminal();
        }
      });

      console.log('%cACCESS GRANTED', 'color:#42f584;font-size:32px;font-weight:bold;');
      console.log('Type ` on the page for a fake terminal. This is cosmetic only.');
    </script>
  </body>
</html>
